ServerTokens Prod
ServerSignature Off

<VirtualHost *:80>
    ServerName app.example.com
    ServerAlias api.example.com ws.example.com rtc.example.com
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName app.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/app.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/app.example.com/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>

<VirtualHost *:443>
    ServerName ws.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/ws.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ws.example.com/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / ws://127.0.0.1:8080/
    ProxyPassReverse / ws://127.0.0.1:8080/
</VirtualHost>

<VirtualHost *:443>
    ServerName rtc.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/rtc.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/rtc.example.com/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:7880/
    ProxyPassReverse / http://127.0.0.1:7880/
</VirtualHost>

<VirtualHost *:443>
    ServerName api.example.com
    DocumentRoot /var/www/chat-api/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.example.com/privkey.pem

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    <Directory /var/www/chat-api/public>
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>
</VirtualHost>
